name: build

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

# Default minimal scope; only the `release` job widens to `contents: write`
# to publish GitHub Releases.
permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version-file: frontend/.node-version
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Build SPA
        working-directory: frontend
        run: pnpm build

      - name: Upload dist
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  # Quality gates pinned to MSRV (1.85). `release` and `publish` depend on this
  # so a broken lint / failing test cannot ship to GitHub Releases or crates.io.
  lint:
    name: Lint & Test
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # `cargo fmt --check` only needs source — runs before any download/cache
      # so style violations fail fast.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      # clippy & test compile the crate, which requires `frontend/dist/` to
      # exist (rust-embed reads it at compile time).
      - name: Pull frontend dist
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --locked

  backend:
    name: ${{ matrix.target }}
    needs: frontend
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Pull frontend dist
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --locked --target ${{ matrix.target }} --bin omni-stream

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          version="${GITHUB_REF_NAME//\//-}"
          name="omni-stream-${version}-${target}"
          mkdir -p dist
          if [[ "$target" == *windows* ]]; then
            bin="target/${target}/release/omni-stream.exe"
            7z a "dist/${name}.zip" "$bin" >/dev/null
            archive="${name}.zip"
          else
            bin="target/${target}/release/omni-stream"
            strip "$bin" || true
            tar -C "$(dirname "$bin")" -czf "dist/${name}.tar.gz" "$(basename "$bin")"
            archive="${name}.tar.gz"
          fi
          (cd dist && shasum -a 256 "${archive}" >"${archive}.sha256")
          echo "artifact=${name}" >>"$GITHUB_OUTPUT"

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.pkg.outputs.artifact }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Release
    needs: [backend, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: omni-stream-*
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  publish-dry-run:
    name: cargo publish --dry-run
    needs: frontend
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Pull frontend dist
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: dtolnay/rust-toolchain@1.85

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-dry-run

      - run: cargo publish --dry-run --locked --registry crates-io

  publish:
    name: cargo publish
    needs: [frontend, backend, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          manifest=$(awk -F\" '/^version *=/ { print $2; exit }' Cargo.toml)
          if [[ "$tag" != "$manifest" ]]; then
            echo "::error::tag v$tag does not match Cargo.toml version $manifest"
            exit 1
          fi

      - name: Pull frontend dist
        uses: actions/download-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: dtolnay/rust-toolchain@1.85

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --registry crates-io
