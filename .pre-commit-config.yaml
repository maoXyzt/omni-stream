repos:
  - repo: local
    hooks:
      - id: rustfmt
        name: rustfmt
        description: Format Rust code (auto-fix in place)
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: cargo clippy
        description: Lint Rust code; fails on warnings (-D warnings)
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: eslint-fix
        name: ESLint fix (frontend TypeScript)
        description: Auto-fix TS/TSX lint issues (runs only when frontend/src files change)
        entry: pnpm -C frontend exec eslint --fix ./src
        language: system
        files: ^frontend/src/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
